{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4>🗑️ Confirm Delete</h4>
            </div>
            <div class="card-body">
                <p class="fs-5">Are you sure you want to delete this tweet?</p>
                <p class="text-muted fst-italic">"{{ tweet.text|truncatechars:80 }}"</p>
                <form method="post" class="d-flex justify-content-center gap-3 mt-3">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Yes, Delete</button>
                    <a class="btn btn-success" href="{% url 'tweet_list' %}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
